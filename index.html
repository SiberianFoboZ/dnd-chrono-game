<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Хроники отряда</title>
    <script>
      // GitHub Pages SPA fallback — восстановление URL после редиректа из 404.html.
      // 404.html переводит /dnd-chrono-game/artur в /dnd-chrono-game/?/artur,
      // здесь мы возвращаем нормальный путь, чтобы Vue Router прочитал его.
      (function (l) {
        if (l.search[1] !== '/') return;
        var decoded = l.search
          .slice(1)
          .split('&')
          .map(function (s) {
            return s.replace(/~and~/g, '&');
          })
          .join('?');
        window.history.replaceState(
          null,
          null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      })(window.location);
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
